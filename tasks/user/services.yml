- name: Prepare systemd user services directory
  file:
    path: "{{ ansible_facts.user_dir }}/.config/systemd/user"
    state: directory

- name: Create user service files
  template:
    src: "systemd.service.j2"
    dest: "{{ ansible_facts.user_dir }}/.config/systemd/user/{{ item.key | replace('_', '-') }}.service"
  loop: "{{ user_services | dict2items }}"
  notify: systemd user reload
  when: item.value.get('create', True)

- name: Create user timer files
  template:
    src: "systemd.timer.j2"
    dest: "{{ ansible_facts.user_dir }}/.config/systemd/user/{{ item.key | replace('_', '-') }}.timer"
  vars:
    timer:
      name: "{{ item.key }}"
      time: "{{ item.value.get('calendar') }}"
  loop: "{{ user_services | dict2items }}"
  notify: systemd user reload
  when: '"calendar" in item.value'

- name: Create user service scripts
  copy:
    dest: "{{ ansible_facts.user_dir }}/.local/bin/service_{{ item.key }}.sh"
    mode: 'u=rwx,g=rwx,o='
    content: |
      #!/bin/bash -e

      {{ item.value.script }}
  loop: "{{ user_services | dict2items }}"
  when: '"script" in item.value'

- meta: flush_handlers

- name: Set configured state for user services
  systemd:
    name: "{{ item.key | replace('_', '-') }}{{ '.timer' if item.value.get('calendar') else '.service' }}"
    state: "{{ item.value.state | default('started' if item.value.enabled | default(true) else 'stopped') }}"
    enabled: "{{ item.value.enabled | default(true) }}"
    daemon_reload: true
    no_block: true
    scope: user
  loop: "{{ user_services | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  tags: containers
