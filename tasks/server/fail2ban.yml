- name: Populate jail.local with default jail settings
  ini_file:
    path: /etc/fail2ban/jail.local
    section: "{{ item.section }}"
    option: "{{ item.option }}"
    value: "{{ item.value }}"
  loop:
    - section: DEFAULT
      option: ignoreip
      value: 127.0.0.1 ::1 10.8.0.0/16 192.168.0.0/16
    - section: DEFAULT
      option: bantime
      value: 90m
    - section: DEFAULT
      option: ignoreself
      value: "true"
  notify: fail2ban restart

- name: Enable fail2ban jails
  ini_file:
    path: /etc/fail2ban/jail.local
    section: "{{ item }}"
    option: enabled
    value: "true"
  loop:
    - sshd
  notify: fail2ban restart

- name: Configure Jellyfin jail
  # Example:
  # Jul 10 23:56:53 nagato systemd-jellyfin[943]: [21:56:53] [INF] [32] Jellyfin.Server.Implementations.Users.UserManager: Authentication request for admin has been denied (IP: 192.168.1.254).
  ini_file:
    path: /etc/fail2ban/jail.d/jellyfin.conf
    section: jellyfin
    option: "{{ item.option }}"
    value: "{{ item.value }}"
  loop:
    - option: enabled
      value: "true"
    - option: logpath
      value: /home/tina/.var/log/jellyfin.log
    - option: filter
      value: jellyfin
  notify: fail2ban restart

- name: Configure Jellyfin filter
  ini_file:
    path: /etc/fail2ban/filter.d/jellyfin.conf
    section: Definition
    option: failregex
    value: '^.*Authentication request for .* has been denied \(IP: <ADDR>\)\.'
  notify: fail2ban restart

- name: Build Caddy suspicious URI matcher regex
  set_fact:
    _caddy_sus_uri_patterns: |-
      {%- set ns = namespace(exact=[], wildcard=[]) -%}
      {%- for entry in sus_http_fails | default([]) -%}
      {%- set escaped = entry | regex_escape -%}
      {%- if '*' in entry -%}
      {%- set _ = ns.wildcard.append(escaped | replace('\\*', '[^"]*')) -%}
      {%- else -%}
      {%- set _ = ns.exact.append(escaped) -%}
      {%- endif -%}
      {%- endfor -%}
      {%- set parts = [] -%}
      {%- if ns.exact | length > 0 -%}
      {%- set _ = parts.append('(?:(?<=/)|(?<="))(?:' ~ (ns.exact | join('|')) ~ ')(?=(?:/|\\?|"))') -%}
      {%- endif -%}
      {%- if ns.wildcard | length > 0 -%}
      {%- set _ = parts.append('(?:(?<=/)|(?<="))(?:' ~ (ns.wildcard | join('|')) ~ ')') -%}
      {%- endif -%}
      {{ parts | join('|') }}

- name: Configure Caddy suspicious-path jail
  ini_file:
    path: /etc/fail2ban/jail.d/caddy-sus-http.conf
    section: caddy-sus-http
    option: '{{ item.option }}'
    value: '{{ item.value }}'
  loop:
    - option: enabled
      value: 'true'
    - option: logpath
      value: /var/log/caddy/access.log
    - option: filter
      value: caddy-sus-http
  notify: fail2ban restart

- name: Configure Caddy suspicious-path filter
  ini_file:
    path: /etc/fail2ban/filter.d/caddy-sus-http.conf
    section: Definition
    option: failregex
    value: '"remote_ip":"<HOST>".*"uri":"[^"]*(?:{{ _caddy_sus_uri_patterns }}).*"status":(?:4\d\d|5\d\d),'
  notify: fail2ban restart

- name: Check if firewalld is installed (Debian)
  when: ansible_os_family == 'Debian'
  command: dpkg -s firewalld
  ignore_errors: true
  register: _firewalld_check_debian

- name: Check if firewalld is installed (RedHat)
  when: ansible_os_family == 'RedHat'
  command: rpm -q firewalld
  ignore_errors: true
  register: _firewalld_check_redhat

- name: Ensure firewalld is disabled
  service:
    name: firewalld
    state: stopped
    enabled: false
  when: |
    (ansible_os_family == 'Debian' and _firewalld_check_debian.rc == 0)
    or
    (ansible_os_family == 'RedHat' and _firewalld_check_redhat.rc == 0)


- name: Ensure fail2ban-firewalld config is absent
  file:
    path: /etc/fail2ban/jail.d/00-firewalld.conf
    state: absent
  notify: fail2ban restart
