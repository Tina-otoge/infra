- name: Ensure config directory exists
  include_role:
    name: common
    tasks_from: create_directory
  vars:
    path: /etc/homeassistant

- name: Install configuration.yaml
  template:
    src: configuration.yaml.j2
    dest: /etc/homeassistant/configuration.yaml
    owner: root
    group: root
    mode: u=rw,g=r,o=r
  notify: restart

- name: Install packages
  copy:
    src: packages/
    dest: /etc/homeassistant/packages/
    owner: root
    group: root
    mode: u=rw,g=r,o=r
  notify: restart

- name: Install scripts
  copy:
    src: scripts/
    dest: /etc/homeassistant/scripts/
    owner: root
    group: root
    mode: u=rwX,g=rX,o=rX
  notify: restart
