users_admins:
  - tina

backups_job_machine_paths_extra:
  - "{{ repositories_dir }}/mechadon/app.db"
  - "{{ repositories_dir }}/mechadon/config.json"
  - "{{ repositories_dir }}/helloasso-discord-role/config.yml"
  - "{{ repositories_dir }}/helloasso-discord-role/save.json"
  - "{{ repositories_dir }}/shlag-webui/config.yml"
  - "{{ repositories_dir }}/lapadmin/var/"
  - "{{ repositories_dir }}/lapadmin/keys/"
  - "{{ repositories_dir }}/photongenic/clients.yml"
  - "{{ repositories_dir }}/photongenic/config.toml"
  - "{{ repositories_dir }}/photongenic/custom/"
  - "{{ repositories_dir }}/monkey/db.json"
  - "{{ repositories_dir }}/msnweb-demo/config.yml"
  - "{{ repositories_dir }}/msnweb-demo/var/"
  - "{{ repositories_dir }}/msnweb/config.yml"
  - "{{ repositories_dir }}/msnweb/var/"
  - "{{ repositories_dir }}/fairyjoke/run_laffey.sh"
  - "{{ repositories_dir }}/fairyjoke/run_laffey_db.sh"
  - "{{ repositories_dir }}/artcompanion/config.json"
  - "{{ repositories_dir }}/artcompanion/data.json"
  - "{{ repositories_dir }}/couscous/.env"
  - "{{ repositories_dir }}/couscous/gitea/"
  - "{{ repositories_dir }}/couscous-orders/.env"
  - "{{ repositories_dir }}/couscous-orders/aliases.yml"
  - "{{ repositories_dir }}/couscous-orders/users.json"

  - "{{ ansible_facts.user_dir }}/.local/share/wallos/"
  - "{{ ansible_facts.user_dir }}/.local/share/wg-easy/"
  - "{{ ansible_facts.user_dir }}/.local/share/uptime-kuma/"
  - "{{ ansible_facts.user_dir }}/.local/share/vaultwarden/"
  - "{{ ansible_facts.user_dir }}/.local/share/grafana/"

  - /etc/motd_laffey_ii_lines.txt

healthchecks: true

packages:
  - btop # requested by reaxt 2026-01-25
  - libffi-devel # needed for PyWand@asso-msn, needs pyenv version recompile
  - ImageMagick-devel # needed for PyWand@asso-msn

caddy_error_handlers:
  - 502

caddy_extra: |
  import users.d/*.conf

caddy_entries_delete:
  - loki

caddy_entries:
  # Machine domain
  - domain: laffey-ii.tina.moe
    file: tina
    root: /home/tina/wwws/laffey-ii
    reverses:
      - path: /fail
        to: 0
      - path: "{{ cockpit_url_root }}"
        to: 9090
    extra: |
      # TODO: redirect ~user to ~user/
      @userdir {
        path_regexp userdir ^/~(\w+)/
      }
      handle @userdir {
        uri strip_prefix /~{re.userdir.1}/
        file_server browse {
          root /home/{re.userdir.1}/www/
        }
      }

      @drs_videos {
        path_regexp drs_videos ^/~tina/lap/drs_videos/(.*)\.mp4
      }
      redir @drs_videos https://drs.lelap.in/videos/{re.drs_videos.1}.mp4
  - domain: laffey.tina.moe
    file: tina
    robots: false
    extra: |
      redir https://laffey-ii.tina.moe{uri}

  # Tina
  - domain: tina.moe
    root: /home/tina/wwws/tina
    file: tina
    reverses:
      - path: /infra
        to: "{{ ports.infra_webui }}"
        remove_path: true
    extra: |
      handle_path /private/* {
        root * /home/tina/wwws/private
        file_server
      }
      redir /private /private/
      handle_path /assets/cloud/* {
        root * /home/tina/wwws/tina-assets
        file_server
      }
  - domain: wallos.tina.moe
    robots: false
    file: tina
    reverses:
      - to: 8003
  - domain: vault.tina.moe
    robots: false
    file: tina
    reverses:
      - to: "{{ ports.vaultwarden }}"
  - domain: couscous.tina.moe
    robots: false
    file: tina
    reverses:
      - to: 57348
  - domain: kuma.tina.moe
    robots: false
    file: tina
    reverses:
      - to: "{{ ports.uptime_kuma }}"
  - domain: fairyjoke.net
    file: tina
    reverses:
      - to: 57302
      - path: /sdvx/genesis/gacha
        to: 15712
        remove_path: true
  - domain: nico.tina.moe
    file: tina
    root: /home/tina/wwws/nico
  - domain: damien.savatier.fr
    file: tina
    root: /home/tina/wwws/damien
    extra: |
      handle_path /private/* {
        root * /home/tina/wwws/private
        file_server
      }

  # Monitoring
  - domain: dijiang.tina.moe
    robots: false
    file: tina
    reverses:
      - path: /loki
        to: 3100
        remove_path: true
        auth:
          username: "{{ secrets.http.loki.username }}"
          password: "{{ secrets.http.loki.password }}"
      - path: /grafana
        to: "{{ ports.grafana }}"

  # Six
  - domain: six.tina.moe
    robots: false
    root: /home/tina/wwws/six
    file: six
    extra: |
      file_server
      handle /jellyfin/* {
        redir https://fin.tina.moe
      }
  - domain: sonic.tina.moe
    robots: false
    file: six
    reverses:
      - to: 8001
  - domain: soku.tina.moe
    robots: false
    file: six
    reverses:
      - to: 8002
  - domain: shin.tina.moe
    robots: false
    file: six
    reverses:
      - to: "{{ ports.feishin }}"


  # Le LAP
  - domain: lelap.in
    file: lap
    root: /home/tina/wwws/lap
    extra: |
      handle_path /discord {
        redir https://discord.gg/4RNagv4pfh
      }
      redir /discord/ /discord

      handle_path /contest/scores/ {
        redir https://docs.google.com/spreadsheets/d/e/2PACX-1vS-mV03DXECeFQ942PkemeGT4e4_h4NYOypMFakGxMbL8EkiO6H-Srf1Md-GBKrLuA7qVt6p0La3qwC/pubhtml
      }
      redir /contest/scores /contest/scores/
  - domain: drs.lelap.in
    file: lap
    robots: false
    root: /home/tina/wwws/lap
    extra: |
      handle_path /videos/* {
        root * /home/tina/www/lap/drs_videos
        file_server
      }
    reverses:
      - to: "{{ ports.shlag_webui }}"
  - domain: admin.lelap.in
    robots: false
    file: lap
    reverses:
      - to: "{{ ports.lapadmin }}"
  # Waiting for DNS
  - domain: replay.lelap.in
    robots: false
    file: lap
    extra: |
      @private remote_ip {{ addresses.lap }} {{ addresses.teapot }} {{ addresses.laffey }} {{ addresses.visian }} {{ addresses.laffey_ii }}

      handle @private {
        reverse_proxy :{{ ports.photongenic }}
      }

      handle /replays/files/* {
        reverse_proxy :{{ ports.photongenic }}
      }

      handle {
        respond <<EOF
          You must be on the LAP network to access this page.
          Please connect to the WiFi.

          SSID: LAP Guest
          Password: crazy shuffle
        EOF 403
      }

  # MSN
  - domain: demo.asso-msn.fr
    robots: false
    file: msn
    reverses:
      - to: "{{ ports.msnweb_demo }}"
  - domain: asso-msn.fr
    file: msn
    reverses:
      - to: "{{ ports.msnweb }}"
    extra: |
      handle_path /assets/* {
        root * /home/tina/wwws/msnweb-assets
        file_server
      }

      handle_path /discord {
        redir https://discord.gg/k4CVGDQ
      }
  - domain: goty.asso-msn.fr
    robots: false
    file: msn
    reverses:
      - to: "{{ ports.goty }}"

  # sayaka
  - domain: mirror.lovelyrad.io
    file: sayaka
    root: /home/sayaka/www/mirror
    browser: true
  - domain: hewwo.lovelyrad.io
    file: sayaka
    reverses:
      - to: 39614

  # reaxt
  - domain: poobmap.reaxt.dev
    file: reaxt
    extra: |
      reverse_proxy 127.0.0.1:25578

users:
  - sayaka
  - reaxt

skel:
  - www
  - wwws/example.com
  - .config/systemd/user
  - .config/containers/systemd

repositories:
  - src: https://github.com/asso-msn/msn-web
    name: msnweb-demo
    version: main
  - src: https://github.com/asso-msn/msn-web
    name: msnweb
    version: main
  - src: https://github.com/asso-msn/helloasso-discord-role
    version: main
  - src: https://github.com/LAP-Arcade/lap-web
    version: main
  - src: https://github.com/LAP-Arcade/lapadmin
    name: lapadmin
    version: main
  - src: git@github.com:LAP-Arcade/MonkeyShlag.git
    name: monkey
    version: main
  - src: git@github.com:LAP-Arcade/shlag-webui.git
    version: main
  - src: https://github.com/asso-msn/MechaDon2
    name: mechadon
  - src: https://github.com/Tina-otoge/photongenic
  - src: https://github.com/Tina-otoge/tina-simp
  - src: https://github.com/FairyJoke/fairyjoke-legacy
    name: fairyjoke
  - src: git@github.com:Tina-otoge/arcade-tools.git
  - src: https://github.com/Tina-otoge/ArtCompanion
    name: artcompanion
  - src: git@github.com:Tina-otoge/couscous-infra.git
    name: couscous
  - src: https://github.com/asso-msn/discord-couscous-orders
    name: couscous-orders
    version: main

user_services:
  mechadon:
    workdir: "{{ repositories_dir }}/mechadon"
    cmd: |
      {{ python_setup }}
      alembic upgrade head
      python -m mechadon
  helloasso_discord_role:
    workdir: "{{ repositories_dir }}/helloasso-discord-role"
    cmd: |
      {{ python_setup }}
      python main.py
    calendar: "*-*-* *:00/5"
  shlag_webui:
    workdir: "{{ repositories_dir }}/shlag-webui"
    cmd: |
      {{ python_setup }}
      flask run -h {{ loopback_ip }} -p {{ ports.shlag_webui }}
  lap_web:
    workdir: "{{ repositories_dir }}/lap-web"
    type: oneshot
    cmd: "{{ sssimp_setup }}"
  lapadmin:
    workdir: "{{ repositories_dir }}/lapadmin"
    cmd: |
      {{ python_setup }}
      alembic upgrade head
      pip install gunicorn
      gunicorn 'app:create_app()' -b {{ loopback_ip }}:{{ ports.lapadmin }} -w 4
  photon:
    workdir: "{{ repositories_dir }}/photongenic"
    cmd: |
      {{ python_setup }}
      (python archive.py &)
      flask --app webui.app:app run -h {{ loopback_ip }} -p {{ ports.photongenic }} --debug
  msn_fa_counter:
    cmd: gh workflow run -R asso-msn/fa-songs-counter cd.yml
    calendar: daily
  monkey:
    workdir: "{{ repositories_dir }}/monkey"
    cmd: ./start.sh
  msnweb_demo:
    workdir: "{{ repositories_dir }}/msnweb-demo"
    cmd: |
      {{ python_setup }}
      pip install gunicorn
      alembic upgrade head
      flask setup
      RUN_TASKS=1 gunicorn -b {{ loopback_ip }}:{{ ports.msnweb_demo }} app:app
  msnweb:
    workdir: "{{ repositories_dir }}/msnweb"
    cmd: |
      {{ python_setup }}
      pip install gunicorn
      alembic upgrade head
      flask setup
      RUN_TASKS=1 gunicorn -b {{ loopback_ip }}:{{ ports.msnweb }} app:app
  rclone_msn:
    workdir: "{{ ansible_facts.user_dir }}/wwws/msnweb-assets"
    script: |
      while true; do
        date
        rclone sync -v msn:Website/Assets/ .
        echo Waiting 60s
        sleep 60
      done
  rclone_tina:
    workdir: "{{ ansible_facts.user_dir }}/wwws/tina-assets/"
    script: |
      while true; do
        date
        rclone sync -v tina:/ .
        echo Waiting 60s
        sleep 60
      done
  tina_simp:
    workdir: "{{ repositories_dir }}/tina-simp"
    cmd: "{{ sssimp_setup }}"
    type: oneshot
  fairyjoke:
    workdir: "{{ repositories_dir }}/fairyjoke"
    cmd: ./run_laffey.sh
  artcompanion:
    workdir: "{{ repositories_dir }}/artcompanion"
    cmd: ./scripts/run.sh
  couscous_infra:
    workdir: "{{ repositories_dir }}/couscous"
    cmd: "{{ compose_setup }}"
  gacha_genesis:
    enabled: false
    workdir: "{{ repositories_dir }}/arcade-tools/sdvx-manual-card-generator"
    cmd: |
      {{ python_setup }}
      PORT=15712 DATA_DIR=./data python gacha.py
  msn_goty:
    workdir: "{{ repositories_dir }}/goty"
    cmd: |
      {{ python_setup }}
      pip install uvicorn
      uvicorn app.application:app --host 127.0.0.1 --port {{ ports.goty }}
  couscous_orders:
    workdir: "{{ repositories_dir }}/couscous-orders"
    cmd: |
      {{ python_setup }}
      python main.py

quadlets:
  mc:
    image: marctv/minecraft-papermc-server
    tag: "{{ minecraft_version }}"
    ports:
      - "{{ ports.minecraft }}:{{ ports.minecraft }}"
    volumes:
      - "{{ ansible_facts.user_dir }}/Games/Minecraft/overdrive:/data"
    env:
      SKIP_PERM_CHECK: "true"
      MEMORYSIZE: 3G
      PUID: 0
      PGID: 0
    podman: -it # Required to be able to attach to the console
  airsonic:
    image: tamland/airsonic-refix
    tag: latest
    ports:
      - "{{ loopback_ip }}:8001:80"
    env:
      SERVER_URL: https://lms.tina.moe
    volumes: []
  soku:
    image: ghcr.io/victoralvesf/aonsoku
    tag: latest
    ports:
      - "{{ loopback_ip }}:8002:8080"
    env:
      SERVER_URL: https://lms.tina.moe
      HIDE_SERVER: "true"
      HIDE_RADIOS_SECTION: "true"
      APP_AUTH_TYPE: password
      APP_USER: guest
      APP_PASSWORD: guest
      SERVER_TYPE: lms
    volumes: []
  feishin:
    image: ghcr.io/jeffvli/feishin
    tag: latest
    ports:
      - "{{ loopback_ip }}:{{ ports.feishin }}:{{ ports.feishin }}"
    env:
      SERVER_NAME: Nagato LMS
      SERVER_URL: https://lms.tina.moe
      SERVER_LOCK: true
      SERVER_TYPE: subsonic
      TZ: Europe/Paris
    volumes: []
  wallos:
    image: bellamy/wallos
    tag: latest
    ports:
      - "{{ loopback_ip }}:8003:80"
    env:
      TZ: Europe/Paris
    volumes:
      - "{{ ansible_facts.user_dir }}/.local/share/wallos/db:/var/www/html/db"
      - "{{ ansible_facts.user_dir }}/.local/share/wallos/uploads/logos:/var/www/html/images/uploads/logos"
  wg_easy:
    image: ghcr.io/wg-easy/wg-easy
    tag: latest
    volumes:
      - "{{ ansible_facts.user_dir }}/.local/share/wg-easy:/etc/wireguard"
    ports:
      - "51820:51820/udp"
      - "{{ loopback_ip }}:51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
      net.ipv4.ip_forward: 1
    env:
      WG_HOST: "{{ ansible_host }}"
      WG_DEVICE: tap0
  photon_smb:
    image: dockurr/samba
    tag: latest
    ports:
      - "{{ wireguard.laffey_ii }}:{{ ports.photongenic_share }}:445"
    volumes:
      - "{{ ansible_facts.user_dir }}/.local/opt/photongenic/files:/storage"
    env:
      UID: 0
      GID: 0
      USER: root
      PASS: photon
      NAME: photon
  kuma:
    image: louislam/uptime-kuma
    tag: latest
    ports:
      - "{{ loopback_ip }}:{{ ports.uptime_kuma }}:{{ ports.uptime_kuma }}"
    volumes:
      - "{{ ansible_facts.user_dir }}/.local/share/uptime-kuma:/app/data"
    podman: --no-hosts
  vaultwarden:
    image: vaultwarden/server
    tag: latest
    ports:
      - "{{ loopback_ip }}:{{ ports.vaultwarden }}:80"
    volumes:
      - "{{ ansible_facts.user_dir }}/.local/share/vaultwarden:/data"
  loki:
    image: grafana/loki
    tag: "{{ versions.loki}}"
    ports:
      - "{{ loopback_ip }}:3100:3100"
    volumes:
    - "{{ ansible_facts.user_dir }}/.config/loki:/etc/loki"
  alloy:
    scope: system
    image: grafana/alloy
    tag: latest
    exec: |
      run
        --server.http.listen-addr=0.0.0.0:{{ ports.alloy }}
        --storage.path=/var/lib/alloy/data
        /etc/alloy/config.alloy
    ports:
      - "{{ loopback_ip }}:{{ ports.alloy }}:{{ ports.alloy }}"
    volumes:
      - /etc/alloy:/etc/alloy:ro
      - /var/log/caddy:/var/log/caddy:ro
  grafana:
    image: grafana/grafana
    tag: latest
    user: root
    ports:
      - "{{ loopback_ip }}:{{ ports.grafana }}:3000"
    env:
      GF_SERVER_DOMAIN: "{{ monitoring_domain }}"
      GF_SERVER_ROOT_URL: "https://{{ monitoring_domain }}/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - "{{ ansible_facts.user_dir }}/.local/share/grafana:/var/lib/grafana"


monitoring_domain: dijiang.tina.moe

