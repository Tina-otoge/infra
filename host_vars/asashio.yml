# TODO:
# - Download https://github.com/intel/intel-linux-firmware to /lib/firmware/i915
#   as root

backups_job_machine_paths_extra:
  - "{{ repositories_dir }}/aniboard/conf/config.yml"
  - "{{ repositories_dir }}/photongenic/client.yml"
  - "{{ repositories_dir }}/photongenic/config.toml"
  - "{{ repositories_dir }}/photongenic/custom/"

  - "{{ ansible_user_dir }}/.config/ownfoil/"
  - "{{ ansible_user_dir }}/.config/sonarr/"
  - "{{ ansible_user_dir }}/.config/qbittorrent/"
  - "{{ ansible_user_dir }}/.config/prowlarr/"
  - "{{ ansible_user_dir }}/.config/lms/"
  - "{{ ansible_user_dir }}/.local/share/lms/"
  - "{{ ansible_user_dir }}/.config/jellyin/"

server_tasks:
  - dnsmasq

packages:
  - acl
  - cifs-utils
  - cockpit-file-sharing
  - cockpit-identities
  - dnsmasq
  - samba
  - samba-client
  - samba-common
  - syncthing
  - wsdd
  # Python
  - bzip2-devel
  - libffi-devel
  - openssl-devel
  - readline-devel

packages_base_excludes:
  # missing packages in EPEL 10.0
  - cockpit-navigator
  - httpie
  - rclone
  - zsh-syntax-highlighting

links:
  /usr/bin/python3: /usr/local/bin/python

dns_servers:
  - 192.168.1.254 # Freebox server
  - 8.8.8.8 # Google DNS 1
  - 8.8.4.4 # Google DNS 2

dns_local_suffixes:
  - lan
  - local

local_ip: 192.168.1.80

hosts_map:
  192.168.1.1: nagato.lan
  192.168.1.3: ninox.lan
  192.168.1.37: printer.lan
  192.168.1.65: pop.lan tv.lan
  192.168.1.76: john.lan
  192.168.1.136: beef.lan
  192.168.1.137: rootage.lan
  192.168.1.139: kokona.lan
  192.168.1.140: copula.lan
  "{{ local_ip }}": asashio.lan
  192.168.1.254: freebox.lan
  127.0.0.2: sddt.amlog.sys-all.net


caddy_error_handlers:
  - 502

caddy_entries:
  - domain: http://asashio.lan
    file: asashio
    extra: |
      redir /* https://asashio.tina.moe{uri}
  - domain: "{{ http_domain }}"
    root: /srv/www/asashio
    file: asashio
    robots: false
    reverses:
      - path: /fail
        to: 0
      - path: "{{ cockpit_url_root }}"
        to: "{{ ports.cockpit }}"
      - path: /syncthing
        to: 8384
        extra:
          header_up Host {upstream_hostport}
        remove_path: true
      - path: /sonarr
        to: 8989
      - path: /qbit
        remove_path: true
        to: "{{ ports.qbittorrent_webui }}"
      - path: /jackett
        to: 9117
      - path: /prowlarr
        to: "{{ ports.prowlarr }}"
      - path: /flood
        to: 3000
      - path: /lidarr
        to: 8686
      - path: /navi
        to: "{{ ports.navidrome }}"
    extra: |
      handle_path /files/* {
        root * /srv/www/files
        file_server browse
      }

  - domain: replay.tina.moe
    robots: false
    file: teapot
    extra: |
      @allow_photon remote_ip private_ranges

      handle @allow_photon {
        reverse_proxy {{ loopback_ip }}:{{ ports.photongenic }}
      }

      handle /replays/files/* {
        reverse_proxy {{ loopback_ip }}:{{ ports.photongenic }}
      }

      respond "Private. See you at the Teapot Arcade!" 403

  - domain: nagato.tina.moe
    file: nagato
    extra: |
      redir /* https://asashio.tina.moe{uri}

  - domain: foil.tina.moe
    file: tina
    robots: false
    reverses:
      - to: "{{ ports.foil }}"
  - domain: aniboard.tina.moe
    file: tina
    robots: false
    reverses:
      - to: "{{ ports.aniboard }}"

  # Six
  - domain: lms.tina.moe
    file: six
    robots: false
    reverses:
      - to: 5082
    extra: |
      import cors
  - domain: fin.tina.moe
    file: six
    robots: false
    reverses:
      - to: "{{ ports.jellyfin }}"
  - domain: kavita.tina.moe
    file: six
    robots: false
    reverses:
      - to: "{{ ports.kavita }}"
  - domain: komga.tina.moe
    file: six
    robots: false
    reverses:
      - to: "{{ ports.komga }}"

repositories:
  - src: https://github.com/Tina-otoge/AniBoard
    name: aniboard
  - src: https://github.com/Tina-otoge/photongenic

user_services:
  aniboard:
    workdir: "{{ repositories_dir }}/aniboard"
    cmd: |
      {{ python_setup }}
      gunicorn -w 4 --timeout 120 app:app -b {{ loopback_ip }}:{{ ports.aniboard }}
  teapot_photon:
    workdir: "{{ repositories_dir }}/photongenic"
    cmd: |
      {{ python_setup }}
      (python archive.py &)
      flask --app webui.app:app run -h {{ loopback_ip }} -p {{ ports.photongenic }} --debug


quadlets:
  ownfoil:
    image: a1ex4/ownfoil
    ports:
      - "{{ loopback_ip }}:{{ ports.foil }}:8465"
    volumes:
      - "{{ ansible_user_dir }}/.config/ownfoil:/app/config"
      - "{{ ansible_user_dir }}/Games/Console/Switch:/games"

  sonarr:
    image: lscr.io/linuxserver/sonarr
    tag: latest
    volumes:
      - "{{ ansible_user_dir }}/.config/sonarr:/config"
      - "/mnt/sakura:/mnt/sakura"
    ports:
      - "{{ loopback_ip }}:8989:8989"
    env: "{{ linuxserver_env }}"
    network: six.network
  qbit:
    image: lscr.io/linuxserver/qbittorrent
    tag: latest
    volumes:
      - "{{ ansible_user_dir }}/.config/qbittorrent:/config"
      - /mnt/sakura:/mnt/sakura
    ports:
      - "{{ loopback_ip }}:{{ ports.qbittorrent_webui }}:8080"
    env: "{{ linuxserver_env }}"
    network: six.network
  prowlarr:
    image: lscr.io/linuxserver/prowlarr
    tag: latest
    volumes:
      - "{{ ansible_user_dir }}/.config/prowlarr:/config"
    ports:
      - "{{ loopback_ip }}:{{ ports.prowlarr }}:{{ ports.prowlarr }}"
    env: "{{ linuxserver_env }}"
    network: six.network
  lms:
    image: epoupon/lms
    tag: latest
    user: root
    ports:
      - "{{ loopback_ip }}:5082:5082"
    volumes:
      - "{{ ansible_user_dir }}/.config/lms:/config"
      - "{{ ansible_user_dir }}/.local/share/lms:/var/lms:rw"
      - /mnt/sakura/public/Works/Music:/music:ro
    exec: /config/lms.conf
  jellyfin:
    image: jellyfin/jellyfin
    tag: "{{ versions.jellyfin }}"
    ports:
      - "{{ loopback_ip }}:{{ ports.jellyfin }}:{{ ports.jellyfin }}"
    volumes:
      - /mnt/sakura/public:/mnt/sakura/public:ro
      - "{{ ansible_user_dir }}/.config/jellyfin:/config"
      - "{{ ansible_user_dir }}/.cache/jellyfin:/cache"
    devices:
      - /dev/dri/renderD128
    groupadds:
      - 105 # render
    networks:
      - six.network
  kavita:
    image: lscr.io/linuxserver/kavita
    tag: latest
    ports:
      - "{{ loopback_ip }}:{{ ports.kavita }}:5000"
    volumes:
      - "{{ ansible_user_dir }}/.config/kavita:/config"
      - "{{ ansible_user_dir }}/.local/share/kavita:/data"
      - /mnt/sakura/public/Works/Books:/mnt/sakura/public/Works/Books:ro
    env: "{{ linuxserver_env }}"
  komga:
    image: gotson/komga
    tag: latest
    ports:
      - "{{ loopback_ip }}:{{ ports.komga }}:25600"
    volumes:
      - "{{ ansible_user_dir }}/.config/komga:/config"
      - "{{ ansible_user_dir }}/.local/share/komga:/data"
      - /mnt/sakura/public/Works/Books:/mnt/sakura/public/Works/Books:ro
    env: "{{ linuxserver_env }}"
  rtmp:
    image: tiangolo/nginx-rtmp
    tag: latest
    ports:
      - "{{ local_ip }}:1935:1935"
    volumes:
      - "{{ ansible_user_dir }}/.config/nginx-rtmp:/etc/nginx/"
