backups_job_machine_paths_extra:
  - "{{ ansible_facts.user_dir }}/.local/share/wg-easy/"
  - "{{ ansible_facts.user_dir }}/.config/qbittorrent/"

packages_base:
  - borgbackup
  - caddy
  - htop
  - fail2ban
  - ncdu
  - neofetch
  - net-tools
  - podman
  - rclone
  - screen
  - sshfs
  - tree
  - vim
  - zsh
  - zsh-syntax-highlighting

server_tasks_disabled:
  - caddy
  - cockpit

caddy_disable_common_loggers: true

caddy_entries:
  - domain: evertsen.tina.moe
    file: evertsen
    reverses:
      - path: /qbit
        remove_path: true
        to: "{{ ports.qbittorrent_webui }}"

quadlets:
  wg_easy:
    image: ghcr.io/wg-easy/wg-easy
    tag: latest
    volumes:
      - "{{ ansible_facts.user_dir }}/.local/share/wg-easy:/etc/wireguard"
    ports:
      - "51820:51820/udp"
      - "{{ loopback_ip }}:51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
      net.ipv4.ip_forward: 1
      net.ipv6.conf.all.disable_ipv6: 0
      net.ipv6.conf.all.forwarding: 1
      net.ipv6.conf.default.forwarding: 1
    env:
      WG_HOST: "{{ ansible_host }}"
      WG_DEVICE: tap0
  qbit:
    image: lscr.io/linuxserver/qbittorrent
    tag: latest
    volumes:
      - "{{ ansible_facts.user_dir }}/.config/qbittorrent:/config"
      - /mnt/asashio/Downloads:/downloads
    ports:
      - "{{ loopback_ip }}:{{ ports.qbittorrent_webui }}:8080"
    env: "{{ linuxserver_env }}"
